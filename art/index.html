  <figcaption>A surrealist painting: a figure made of overlapping translucent hands, reaching in all directions. Most hands press against invisible walls - you can see the glass-like surfaces deforming slightly where they touch. But one hand, at the center, reaches into pure open space where there is no wall. That hand hesitates. The color palette is deep blues and ambers, with the open space rendered in a softer, more uncertain light than the walls. The walls look almost comfortable. The open space looks terrifying. Style: Francis Bacon meets Remedios Varo. Emotionally complex. No text.</figcaption>
